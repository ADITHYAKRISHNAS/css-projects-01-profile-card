<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <div class="card__banner"></div>
        <img class="card__avatar" src="images/avatar.jpg" alt="Profile photo" />
        <h1 class="card__name">Chisom Chukwukwe</h1>
        <p class="card__role">UI/UX Designer</p>
        <p class="card__bio">
          Hardworking and reliable UI/UX designer focused on going above and
          beyond to support teams and serve customers.
        </p>
        <div class="card__social">
          <a href="#">FB</a>
          <a href="#">IN</a>
          <a href="#">IG</a>
          <a href="#">YT</a>
          <a href="#">TW</a>
        </div>
        <a href="#" class="card__button">Buy me a coffee</a>
      </div>
    
  </body>
</html>
